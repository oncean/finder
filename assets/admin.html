<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风向标管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 360px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #b2ea1c;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #b2ea1c;
            border: none;
            border-radius: 4px;
            color: #333;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #a1d91a;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .error {
            color: #ff4d4f;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        .success {
            color: #52c41a;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }

        /* 管理页面样式 */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 200px;
            background: #2d3748;
            color: white;
            padding: 20px;
        }
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid #4a5568;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            color: #a0aec0;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #4a5568;
            color: white;
        }
        .main-content {
            flex: 1;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        .header .logout-btn {
            padding: 8px 16px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-header h3 {
            font-size: 18px;
            color: #333;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .table th {
            background: #fafafa;
            font-weight: 600;
            color: #666;
        }
        .table tr:hover {
            background: #f9f9f9;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .action-btn.edit {
            background: #1890ff;
            color: white;
        }
        .action-btn.delete {
            background: #ff4d4f;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        .pagination button.active {
            background: #b2ea1c;
            border-color: #b2ea1c;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #b2ea1c;
        }
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>管理员登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="login()">登录</button>
            <div id="loginMessage" class="error"></div>
        </div>
    </div>

    <!-- 管理页面 -->
    <div id="adminPage" class="admin-container" style="display: none;">
        <div class="sidebar">
            <h2>管理后台</h2>
            <ul>
                <li><a href="#dashboard" onclick="showDashboard()">首页</a></li>
                <li><a href="#users" onclick="showUsers()">用户管理</a></li>
                <li><a href="#admins" onclick="showAdmins()">管理员管理</a></li>
                <li><a href="#posts" onclick="showPosts()">帖子管理</a></li>
                <li><a href="#shops" onclick="showShops()">商家管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <h1 id="pageTitle">欢迎</h1>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
            <div id="pageContent"></div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">编辑</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn" onclick="saveModal()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('adminToken');
        let currentPage = 'dashboard';
        let currentEditId = null;
        let currentEditType = '';

        if (token) {
            showAdminPage();
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const message = document.getElementById('loginMessage');

            if (!username || !password) {
                message.innerHTML = '请输入用户名和密码';
                message.className = 'error';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('adminToken', token);
                    showAdminPage();
                } else {
                    message.innerHTML = data.message || '登录失败';
                    message.className = 'error';
                }
            } catch (error) {
                message.innerHTML = '网络错误';
                message.className = 'error';
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
        }

        function showAdminPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'flex';
            showDashboard();
        }

        async function showDashboard() {
            currentPage = 'dashboard';
            document.getElementById('pageTitle').textContent = '首页';
            updateActiveLink('dashboard');
            
            try {
                const [usersRes, postsRes, shopsRes, adminsRes] = await Promise.all([
                    fetch(`${API_BASE}/admin/users?limit=1`, { headers: getAuthHeaders() }),
                    fetch(`${API_BASE}/admin/posts?limit=1`, { headers: getAuthHeaders() }),
                    fetch(`${API_BASE}/admin/shops?limit=1`, { headers: getAuthHeaders() }),
                    fetch(`${API_BASE}/admin/admins?limit=1`, { headers: getAuthHeaders() })
                ]);
                
                const [users, posts, shops, admins] = await Promise.all([
                    usersRes.json(),
                    postsRes.json(),
                    shopsRes.json(),
                    adminsRes.json()
                ]);

                document.getElementById('pageContent').innerHTML = `
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="number">${users.total || 0}</div>
                            <div class="label">用户总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${posts.total || 0}</div>
                            <div class="label">帖子总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${shops.total || 0}</div>
                            <div class="label">商家总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${admins.total || 0}</div>
                            <div class="label">管理员总数</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>最近帖子</h3>
                            <button class="btn" onclick="showPosts()">查看全部</button>
                        </div>
                        <table class="table">
                            <tr><th>标题</th><th>作者</th><th>时间</th></tr>
                            ${posts.data && posts.data.slice(0, 5).map(p => `
                                <tr><td>${p.title}</td><td>${p.author?.nickname || '未知'}</td><td>${formatDate(p.createdAt)}</td></tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (error) {
                handleError(error);
            }
        }

        async function showUsers(page = 1, keyword = '') {
            currentPage = 'users';
            document.getElementById('pageTitle').textContent = '用户管理';
            updateActiveLink('users');
            
            try {
                const response = await fetch(`${API_BASE}/admin/users?page=${page}&limit=10&keyword=${encodeURIComponent(keyword)}`, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();

                document.getElementById('pageContent').innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h3>用户列表</h3>
                            <button class="btn" onclick="openCreateModal('user')">添加用户</button>
                        </div>
                        <div class="search-bar">
                            <input type="text" id="userSearch" placeholder="搜索用户..." value="${keyword}">
                            <button class="btn" onclick="showUsers(1, document.getElementById('userSearch').value)">搜索</button>
                        </div>
                        <table class="table">
                            <tr><th>ID</th><th>昵称</th><th>手机</th><th>城市</th><th>创建时间</th><th>操作</th></tr>
                            ${data.data.map(user => `
                                <tr>
                                    <td>${user.id.slice(0, 8)}</td>
                                    <td><img src="${user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + user.id}" width="32" height="32" style="border-radius: 50%; vertical-align: middle; margin-right: 8px;">${user.nickname}</td>
                                    <td>${user.phone || '-'}</td>
                                    <td>${user.location?.city || '-'}</td>
                                    <td>${formatDate(user.createdAt)}</td>
                                    <td>
                                        <div class="action-btns">
                                            <button class="action-btn edit" onclick="openEditModal('user', '${user.id}')">编辑</button>
                                            <button class="action-btn delete" onclick="deleteItem('user', '${user.id}')">删除</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                        ${renderPagination(data, showUsers, keyword)}
                    </div>
                `;
            } catch (error) {
                handleError(error);
            }
        }

        async function showAdmins(page = 1, keyword = '') {
            currentPage = 'admins';
            document.getElementById('pageTitle').textContent = '管理员管理';
            updateActiveLink('admins');
            
            try {
                const response = await fetch(`${API_BASE}/admin/admins?page=${page}&limit=10&keyword=${encodeURIComponent(keyword)}`, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();

                document.getElementById('pageContent').innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h3>管理员列表</h3>
                            <button class="btn" onclick="openCreateModal('admin')">添加管理员</button>
                        </div>
                        <div class="search-bar">
                            <input type="text" id="adminSearch" placeholder="搜索管理员..." value="${keyword}">
                            <button class="btn" onclick="showAdmins(1, document.getElementById('adminSearch').value)">搜索</button>
                        </div>
                        <table class="table">
                            <tr><th>ID</th><th>用户名</th><th>昵称</th><th>手机</th><th>权限</th><th>创建时间</th><th>操作</th></tr>
                            ${data.data.map(admin => `
                                <tr>
                                    <td>${admin.id.slice(0, 8)}</td>
                                    <td>${admin.username}</td>
                                    <td>${admin.nickname}</td>
                                    <td>${admin.phone || '-'}</td>
                                    <td>${admin.permissions?.join(', ') || '-'}</td>
                                    <td>${formatDate(admin.createdAt)}</td>
                                    <td>
                                        <div class="action-btns">
                                            <button class="action-btn edit" onclick="openEditModal('admin', '${admin.id}')">编辑</button>
                                            <button class="action-btn delete" onclick="deleteItem('admin', '${admin.id}')">删除</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                        ${renderPagination(data, showAdmins, keyword)}
                    </div>
                `;
            } catch (error) {
                handleError(error);
            }
        }

        async function showPosts(page = 1, keyword = '') {
            currentPage = 'posts';
            document.getElementById('pageTitle').textContent = '帖子管理';
            updateActiveLink('posts');
            
            try {
                const response = await fetch(`${API_BASE}/admin/posts?page=${page}&limit=10&keyword=${encodeURIComponent(keyword)}`, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();

                document.getElementById('pageContent').innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h3>帖子列表</h3>
                        </div>
                        <div class="search-bar">
                            <input type="text" id="postSearch" placeholder="搜索帖子..." value="${keyword}">
                            <button class="btn" onclick="showPosts(1, document.getElementById('postSearch').value)">搜索</button>
                        </div>
                        <table class="table">
                            <tr><th>标题</th><th>作者</th><th>推荐</th><th>评论数</th><th>时间</th><th>操作</th></tr>
                            ${data.data.map(post => `
                                <tr>
                                    <td>${post.title}</td>
                                    <td>${post.author?.nickname || '未知'}</td>
                                    <td>${post.isRecommended ? '是' : '否'}</td>
                                    <td>${post.reviewCount}</td>
                                    <td>${formatDate(post.createdAt)}</td>
                                    <td>
                                        <div class="action-btns">
                                            <button class="action-btn edit" onclick="openEditModal('post', '${post.id}')">编辑</button>
                                            <button class="action-btn delete" onclick="deleteItem('post', '${post.id}')">删除</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                        ${renderPagination(data, showPosts, keyword)}
                    </div>
                `;
            } catch (error) {
                handleError(error);
            }
        }

        async function showShops(page = 1, keyword = '') {
            currentPage = 'shops';
            document.getElementById('pageTitle').textContent = '商家管理';
            updateActiveLink('shops');
            
            try {
                const response = await fetch(`${API_BASE}/admin/shops?page=${page}&limit=10&keyword=${encodeURIComponent(keyword)}`, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();

                document.getElementById('pageContent').innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h3>商家列表</h3>
                            <button class="btn" onclick="openCreateModal('shop')">添加商家</button>
                        </div>
                        <div class="search-bar">
                            <input type="text" id="shopSearch" placeholder="搜索商家..." value="${keyword}">
                            <button class="btn" onclick="showShops(1, document.getElementById('shopSearch').value)">搜索</button>
                        </div>
                        <table class="table">
                            <tr><th>名称</th><th>分类</th><th>评分</th><th>评论数</th><th>认证</th><th>操作</th></tr>
                            ${data.data.map(shop => `
                                <tr>
                                    <td>${shop.name}</td>
                                    <td>${shop.category || '-'}</td>
                                    <td>${shop.rating}</td>
                                    <td>${shop.reviewCount}</td>
                                    <td>${shop.isVerified ? '已认证' : '未认证'}</td>
                                    <td>
                                        <div class="action-btns">
                                            <button class="action-btn edit" onclick="openEditModal('shop', '${shop.id}')">编辑</button>
                                            <button class="action-btn delete" onclick="deleteItem('shop', '${shop.id}')">删除</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                        ${renderPagination(data, showShops, keyword)}
                    </div>
                `;
            } catch (error) {
                handleError(error);
            }
        }

        async function openEditModal(type, id) {
            currentEditId = id;
            currentEditType = type;
            
            try {
                const response = await fetch(`${API_BASE}/admin/${type}s/${id}`, { headers: getAuthHeaders() });
                const data = await response.json();
                
                document.getElementById('modalTitle').textContent = '编辑' + getTypeName(type);
                document.getElementById('modalBody').innerHTML = getEditForm(type, data.data);
                document.getElementById('modal').classList.add('active');
            } catch (error) {
                handleError(error);
            }
        }

        function openCreateModal(type) {
            currentEditId = null;
            currentEditType = type;
            
            document.getElementById('modalTitle').textContent = '添加' + getTypeName(type);
            document.getElementById('modalBody').innerHTML = getEditForm(type, {});
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentEditId = null;
        }

        async function saveModal() {
            const type = currentEditType;
            const id = currentEditId;
            const data = getFormData(type);
            
            try {
                const url = id ? `${API_BASE}/admin/${type}s/${id}` : `${API_BASE}/admin/${type}s`;
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    closeModal();
                    refreshCurrentPage();
                } else {
                    alert(result.message || '操作失败');
                }
            } catch (error) {
                handleError(error);
            }
        }

        async function deleteItem(type, id) {
            if (!confirm(`确定要删除这个${getTypeName(type)}吗？`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/${type}s/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    refreshCurrentPage();
                } else {
                    alert(result.message || '删除失败');
                }
            } catch (error) {
                handleError(error);
            }
        }

        function getTypeName(type) {
            const names = { user: '用户', admin: '管理员', post: '帖子', shop: '商家' };
            return names[type] || type;
        }

        function getEditForm(type, data) {
            if (type === 'user') {
                return `
                    <div class="form-group"><label>昵称</label><input type="text" id="formNickname" value="${data.nickname || ''}"></div>
                    <div class="form-group"><label>头像URL</label><input type="text" id="formAvatar" value="${data.avatar || ''}"></div>
                    <div class="form-group"><label>手机</label><input type="text" id="formPhone" value="${data.phone || ''}"></div>
                    <div class="form-group"><label>城市</label><input type="text" id="formCity" value="${data.location?.city || ''}"></div>
                `;
            } else if (type === 'admin') {
                return `
                    <div class="form-group"><label>用户名</label><input type="text" id="formUsername" value="${data.username || ''}"></div>
                    <div class="form-group"><label>${currentEditId ? '新密码（留空不修改）' : '密码'}</label><input type="password" id="formPassword"></div>
                    <div class="form-group"><label>昵称</label><input type="text" id="formNickname" value="${data.nickname || ''}"></div>
                    <div class="form-group"><label>手机</label><input type="text" id="formPhone" value="${data.phone || ''}"></div>
                `;
            } else if (type === 'post') {
                return `
                    <div class="form-group"><label>标题</label><input type="text" id="formTitle" value="${data.title || ''}"></div>
                    <div class="form-group"><label>内容</label><textarea id="formContent" rows="3">${data.content || ''}</textarea></div>
                    <div class="form-group">
                        <label>推荐</label>
                        <select id="formIsRecommended">
                            <option value="false" ${!data.isRecommended ? 'selected' : ''}>否</option>
                            <option value="true" ${data.isRecommended ? 'selected' : ''}>是</option>
                        </select>
                    </div>
                    <div class="form-group"><label>推荐排序</label><input type="number" id="formRecommendRank" value="${data.recommendRank || ''}"></div>
                `;
            } else if (type === 'shop') {
                return `
                    <div class="form-group"><label>名称</label><input type="text" id="formName" value="${data.name || ''}"></div>
                    <div class="form-group"><label>分类</label><input type="text" id="formCategory" value="${data.category || ''}"></div>
                    <div class="form-group"><label>地址</label><input type="text" id="formAddress" value="${data.address || ''}"></div>
                    <div class="form-group"><label>电话</label><input type="text" id="formPhone" value="${data.phone || ''}"></div>
                    <div class="form-group"><label>封面图URL</label><input type="text" id="formCoverImage" value="${data.coverImage || ''}"></div>
                    <div class="form-group"><label>Logo URL</label><input type="text" id="formLogo" value="${data.logo || ''}"></div>
                    <div class="form-group">
                        <label>认证</label>
                        <select id="formIsVerified">
                            <option value="false" ${!data.isVerified ? 'selected' : ''}>未认证</option>
                            <option value="true" ${data.isVerified ? 'selected' : ''}>已认证</option>
                        </select>
                    </div>
                `;
            }
        }

        function getFormData(type) {
            if (type === 'user') {
                return {
                    nickname: document.getElementById('formNickname').value,
                    avatar: document.getElementById('formAvatar').value || undefined,
                    phone: document.getElementById('formPhone').value || undefined,
                    location: { city: document.getElementById('formCity').value }
                };
            } else if (type === 'admin') {
                const data = {
                    username: document.getElementById('formUsername').value,
                    nickname: document.getElementById('formNickname').value,
                    phone: document.getElementById('formPhone').value || undefined
                };
                const password = document.getElementById('formPassword').value;
                if (password) data.password = password;
                return data;
            } else if (type === 'post') {
                return {
                    title: document.getElementById('formTitle').value,
                    content: document.getElementById('formContent').value,
                    isRecommended: document.getElementById('formIsRecommended').value === 'true',
                    recommendRank: document.getElementById('formRecommendRank').value ? parseInt(document.getElementById('formRecommendRank').value) : undefined
                };
            } else if (type === 'shop') {
                return {
                    name: document.getElementById('formName').value,
                    category: document.getElementById('formCategory').value || undefined,
                    address: document.getElementById('formAddress').value || undefined,
                    phone: document.getElementById('formPhone').value || undefined,
                    coverImage: document.getElementById('formCoverImage').value || undefined,
                    logo: document.getElementById('formLogo').value || undefined,
                    isVerified: document.getElementById('formIsVerified').value === 'true'
                };
            }
        }

        function refreshCurrentPage() {
            switch(currentPage) {
                case 'dashboard': showDashboard(); break;
                case 'users': showUsers(); break;
                case 'admins': showAdmins(); break;
                case 'posts': showPosts(); break;
                case 'shops': showShops(); break;
            }
        }

        function updateActiveLink(page) {
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.querySelector(`.sidebar a[href="#${page}"]`)?.classList.add('active');
        }

        function getAuthHeaders() {
            return { Authorization: `Bearer ${token}` };
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function renderPagination(data, callback, keyword) {
            const totalPages = Math.ceil(data.total / data.limit);
            if (totalPages <= 1) return '';
            
            let html = '<div class="pagination">';
            if (data.page > 1) {
                html += `<button onclick="${callback.name}(${data.page-1}, '${keyword}')">上一页</button>`;
            }
            for (let i = 1; i <= totalPages; i++) {
                html += `<button ${i === data.page ? 'class="active"' : ''} onclick="${callback.name}(${i}, '${keyword}')">${i}</button>`;
            }
            if (data.page < totalPages) {
                html += `<button onclick="${callback.name}(${data.page+1}, '${keyword}')">下一页</button>`;
            }
            html += '</div>';
            return html;
        }

        function handleError(error) {
            console.error(error);
            if (error.message.includes('401')) {
                logout();
            } else {
                alert('操作失败，请重试');
            }
        }
    </script>
</body>
</html>
